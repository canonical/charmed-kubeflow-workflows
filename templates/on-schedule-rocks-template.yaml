# Meant to be copied over as is in all rocks repositories with
# the name `on_schedule.yaml`. Assumes the consumer repo has a
# `.github/automatic_backport_tracks.yaml` file with the form:
#
#   automatic_backport_tracks:
#     - track/X
#     - track/Y
#
# Runs once a month and on manual dispatch. The `build-scan-test-publish` job is
# matrixed over `main` plus every ref listed under `automatic_backport_tracks`.
# For each ref, every rock in the repository (i.e. every directory containing
# a rockcraft.yaml) is built, scanned, tested and published. On failure, a
# GitHub issue is opened (or commented on) per failing rock.
name: Scheduled rebuild rocks

on:
  schedule:
    - cron: '0 4 1 * *'   # 1st of each month, 04:00 UTC
  workflow_dispatch:

jobs:
  list-refs:
    name: Compute ref matrix
    runs-on: ubuntu-24.04
    outputs:
      refs: ${{ steps.compute.outputs.refs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build ref matrix from automatic_backport_tracks.yaml
        id: compute
        run: |
          file=.github/automatic_backport_tracks.yaml
          if [ -f "$file" ]; then
            refs=$(yq -o=json -I=0 '["main"] + .automatic_backport_tracks' "$file")
          else
            echo "::warning file=${file}::${file} not found; falling back to main only"
            refs='["main"]'
          fi
          echo "Refs: ${refs}"
          echo "refs=${refs}" >> "$GITHUB_OUTPUT"

  build-scan-test-publish:
    name: Build, scan, test and publish rocks (${{ matrix.ref }})
    needs: list-refs
    strategy:
      fail-fast: false
      matrix:
        ref: ${{ fromJson(needs.list-refs.outputs.refs) }}
    uses: canonical/charmed-kubeflow-workflows/.github/workflows/get-all-rocks-and-build-scan-test-publish.yaml@main
    permissions:
      contents: read
      issues: write
    secrets: inherit
    with:
      base-ref: ${{ matrix.ref }}
