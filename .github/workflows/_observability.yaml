# this CI is for internal import from another template
name: Observability Test

on:
  workflow_call:

jobs:
  integration-observability:
    name: Observability Integration Test
    runs-on: ubuntu-20.04

    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Setup operator environment
        uses: charmed-kubernetes/actions-operator@1.1.0
        with:
          provider: microk8s
          channel: 1.25-strict/stable
          juju-channel: 3.1/stable
          charmcraft-channel: latest/edge
          microk8s-addons: "dns storage rbac metallb:'10.64.140.43-10.64.140.49,192.168.0.105-192.168.0.111'"

      - name: Run integration tests
        run: |
            sg snap_microk8s -c "juju add-model cos-test"
            sg snap_microk8s -c "tox -vve cos-integration -- --model cos-test --destructive-mode"

      - name: Collect charm debug artifacts
        uses: canonical/kubeflow-ci/actions/dump-charm-debug-artifacts@main
        if: always()

      - name: Collect prometheus
        run: sg snap_microk8s -c "microk8s.kubectl get pod prometheus-k8s-0 -o=jsonpath='{.status}' -n cos-test"
        if: always()
